name: Deploy Graph To Pages

on:
  push:
    branches: ["main"]
    paths:
      - "graphify-out/**"
      - ".github/workflows/deploy-graph-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare Pages Site
        run: |
          rm -rf _site
          mkdir -p _site/graphify-out
          cp -a graphify-out/. _site/
          cp -a graphify-out/. _site/graphify-out/
          if [ -f index.html ]; then
            cp -a index.html _site/index.html
          fi

      - name: Upload Graph Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
